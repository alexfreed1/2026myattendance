{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-12">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="inline-flex bg-brand-dark text-white rounded-xl p-3 mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900">Admin Login</h2>
            <p class="text-sm text-gray-500 mt-1">Sign in to manage the system</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <form method="POST" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition">
                </div>
                <button type="submit"
                        class="w-full bg-brand-dark hover:bg-brand text-white font-semibold py-2.5 rounded-lg transition text-sm">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
            <a href="{{ url_for('lecturer.login') }}" class="text-brand hover:underline">Lecturer login →</a>
        </p>
    </div>
</div>
{% endblock %}
