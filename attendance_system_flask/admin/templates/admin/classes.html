{% extends "base.html" %}

{% block title %}Manage Classes{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Manage Classes</h2>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addClassModal">Add New Class</button>
</div>
<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for class_item in classes %}
            <tr>
                <td>{{ class_item.id }}</td>
                <td>{{ class_item.name }}</td>
                <td>{{ class_item.department_name }}</td>
                <td>
                    <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#editClassModal{{ class_item.id }}">Edit</button>
                    <form method="POST" action="{{ url_for('admin.delete_class', id=class_item.id) }}" class="d-inline" onsubmit="return confirm('Delete this class?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            <!-- Edit Modal -->
            <div class="modal fade" id="editClassModal{{ class_item.id }}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header"><h5 class="modal-title">Edit Class</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                        <form method="POST" action="{{ url_for('admin.edit_class', id=class_item.id) }}">
                            <div class="modal-body">
                                <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" name="name" value="{{ class_item.name }}" required></div>
                                <div class="mb-3"><label class="form-label">Department</label>
                                    <select class="form-select" name="department_id" required>
                                        {% for d in departments %}<option value="{{ d.id }}" {% if d.id == class_item.department_id %}selected{% endif %}>{{ d.name }}</option>{% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Add Modal -->
<div class="modal fade" id="addClassModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Add Class</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form method="POST" action="{{ url_for('admin.add_class') }}">
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" name="name" required></div>
                    <div class="mb-3"><label class="form-label">Department</label>
                        <select class="form-select" name="department_id" required>
                            <option value="">-- Select Department --</option>
                            {% for d in departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
                        </select>
                    </div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="submit" class="btn btn-success">Add</button></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
